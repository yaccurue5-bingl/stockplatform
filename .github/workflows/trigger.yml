name: Market Data & AI Disclosure Automation

on:
  schedule:
    # ── 장 전 예열 (KST 07:30, 07:45  =  UTC 전날 22:30, 22:45) ───────────────
    - cron: "30,45 22 * * 0-4"
    # ── 장 전 예열 (KST 08:00-08:45   =  UTC 전날 23:00-23:45) ───────────────
    - cron: "*/15 23 * * 0-4"
    # ── 장 중 (KST 09:00-15:45        =  UTC 00:00-06:45) ─────────────────────
    - cron: "*/15 0-6 * * 1-5"
    # ── EOD 장 마감 후 1회 (KST 16:35  =  UTC 07:35) ──────────────────────────
    - cron: "35 7 * * 1-5"
    # ── 매월 15일 sector_macro 갱신 알림 (KST 10:00 = UTC 01:00) ──────────────
    - cron: "0 1 15 * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 선택"
        required: false
        default: "prod"
        type: choice
        options:
          - prod   # 장 중 배치 (DART 수집 → AI 분석 → 스코어)
          - eod    # 장 마감 후 배치 (시세·대차 확정 → LPS → 스코어 갱신)

# ── 공통 환경변수 ─────────────────────────────────────────────────────────────
env:
  PYTHONPATH: ${{ github.workspace }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}     # Groq Dev 전환 시 재활성화
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DART_API_KEY: ${{ secrets.DART_API_KEY }}
  PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
  ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # MONTHLY — 매월 15일 sector_macro 갱신 알림
  #   트리거: '0 1 15 * *' cron만
  # ════════════════════════════════════════════════════════════════════════════
  monthly-sector-macro:
    name: "Monthly sector_macro Staleness Check"
    if: >-
      github.event_name == 'schedule' && github.event.schedule == '0 1 15 * *'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 스테일 시 Actions 경고 (빨간 X) — 수동 업데이트 필요 신호
      - name: "sector_macro 스테일니스 점검 (--alert)"
        run: python scripts/backfill_sector_macro.py --status --alert

  # ════════════════════════════════════════════════════════════════════════════
  # COLLECT — 장 전·장 중 수집 전용 (15분마다, 취소 허용)
  #   DART 수집 + 시세 + 외국인지표
  #   cancel-in-progress: true — 최신 실행이 이전 실행을 취소해도 무방
  # ════════════════════════════════════════════════════════════════════════════
  prod-collect:
    name: "Intraday Collect (DART + Market)"
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'eod') ||
      (github.event_name == 'schedule' && github.event.schedule != '35 7 * * 1-5' && github.event.schedule != '0 1 15 * *')
    runs-on: ubuntu-latest
    concurrency:
      group: prod-collect
      cancel-in-progress: true   # 새 수집이 오면 이전 수집 취소 (최신 우선)
    timeout-minutes: 90          # DART 1300건 × 3초 = 65분 + 여유

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: "① 시장 지수 업데이트"
        run: python scripts/update_indices.py

      - name: "② 수집 배치 (DART + 시세 + 외국인지표)"
        run: python scripts/run_daily_batch.py --collect

  # ════════════════════════════════════════════════════════════════════════════
  # ANALYZE — 장 전·장 중 분석 전용 (15분마다, 취소 금지)
  #   AI 분석 + Score + Telegram + Twitter
  #   cancel-in-progress: false — 큐잉 후 순차 실행, 반드시 완료
  # ════════════════════════════════════════════════════════════════════════════
  prod-analyze:
    name: "Intraday Analyze (AI + Score + Notify)"
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'eod') ||
      (github.event_name == 'schedule' && github.event.schedule != '35 7 * * 1-5' && github.event.schedule != '0 1 15 * *')
    runs-on: ubuntu-latest
    concurrency:
      group: prod-analyze
      cancel-in-progress: false  # 분석은 절대 취소 금지 — 큐잉 후 순차 완료
    timeout-minutes: 30          # AI 분석 100건 × ~4초 + 스코어 = 약 10분

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: "③ 분석 배치 (AI + Score + Telegram + Twitter)"
        run: python scripts/run_daily_batch.py --analyze

  # ════════════════════════════════════════════════════════════════════════════
  # EOD — 장 마감 후 1일 1회 (KST 16:35)
  #   트리거: EOD cron('35 7 * * 1-5')  또는  workflow_dispatch(mode=eod)
  # ════════════════════════════════════════════════════════════════════════════
  eod-batch:
    name: "EOD End-of-Day Batch"
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'eod') ||
      (github.event_name == 'schedule' && github.event.schedule == '35 7 * * 1-5' && github.event.schedule != '0 1 15 * *')
    runs-on: ubuntu-latest
    # EOD는 1일 1회 — 중복 방지 + 120분 제한
    concurrency:
      group: eod-batch
      cancel-in-progress: false  # EOD는 중간에 취소하지 않음 (데이터 무결성)
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 종가·대차 확정 수집 → LPS 재계산 → AI 백필 → FinalScore 갱신
      # → 섹터 시그널 → event_stats 재집계
      - name: "EOD 장 마감 배치 (--eod)"
        run: python scripts/run_daily_batch.py --eod

      # 처리 지연 메트릭 — 당일 파이프라인 품질 점검
      # P90 > 30분 또는 당일 수집률 < 80% 시 Actions 경고 (비블로킹)
      - name: "처리 지연 메트릭 점검"
        run: python scripts/check_processing_lag.py --today --alert
        continue-on-error: true  # P90>30분 시 step 실패(노란 경고)로 표시, job은 계속

      # sector_macro 스테일니스 점검 (매월 15일 이후 실행 시 유효)
      - name: "sector_macro 데이터 현황 점검"
        run: python scripts/backfill_sector_macro.py --status
        continue-on-error: true
