<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#ffffff"/>

  <!-- Blue circle ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#1a3fa8" stroke-width="7"/>

  <!-- Gold arc accent (bottom-left) -->
  <path d="M 14 65 A 42 42 0 0 0 50 92" fill="none" stroke="#f0b429" stroke-width="7" stroke-linecap="round"/>

  <!-- K letter -->
  <text
    x="52"
    y="68"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="58"
    text-anchor="middle"
    fill="#1a3fa8"
  >K</text>

  <!-- Small upward arrow (chart signal) -->
  <polyline
    points="62,44 68,32 74,38"
    fill="none"
    stroke="#f0b429"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
